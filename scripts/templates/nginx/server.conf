server {
	listen 8080;
	server_name SERVERNAME;

	# CFML-specific settings
	client_max_body_size 100m;
	proxy_read_timeout 300;
	proxy_connect_timeout 30;
	proxy_send_timeout 300;

	# Handle static assets first (no rewrite needed)
	location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
		proxy_pass http://127.0.0.1:LUCEE_PORT;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}

	# Handle root path
	location = / {
		proxy_pass http://127.0.0.1:LUCEE_PORT/index.cfm;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Handle WebSocket upgrades
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	# Don't rewrite requests that already go to .cfm files
	location ~ \.cfm {
		proxy_pass http://127.0.0.1:LUCEE_PORT;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Handle WebSocket upgrades
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	# Rewrite all other paths to go through index.cfm
	location / {
		rewrite ^/(.+)$ /index.cfm/$1 last;
		proxy_pass http://127.0.0.1:LUCEE_PORT;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Handle WebSocket upgrades
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
}
